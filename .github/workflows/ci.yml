name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format check
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Integration tests under tests/integration auto-skip here: they import a
      # sibling ../vaultbase checkout (serverAvailable() === false in CI).
      - name: Test
        run: bun test

      - name: Build
        run: bun run build
